name: Keep signaling server awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PeerJS server on Render
        run: |
          curl -sS --max-time 100 -o /dev/null -w "HTTP %{http_code}\n" \
            https://yaniv-peer.onrender.com/ps
